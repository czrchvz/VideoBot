name: Build VideoBot APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    env:
      HOME: /home/user
    steps:
      - uses: actions/checkout@v4

      - name: Compilar APK
        run: |
          # Asegurar que buildozer use el HOME correcto del contenedor
          export HOME=/home/user
          export BUILDOZER_WARN_ON_ROOT=0
          cd $GITHUB_WORKSPACE
          yes | buildozer android debug 2>&1

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoBot-APK
          path: bin/*.apk
          retention-days: 30
