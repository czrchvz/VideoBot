name: Build VideoBot APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Compilar APK
        run: |
          yes | buildozer android debug 2>&1
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoBot-APK
          path: bin/*.apk
          retention-days: 30
