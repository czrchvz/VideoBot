name: Build VideoBot APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Aceptar licencias Android SDK
        run: |
          mkdir -p /github/home/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > /github/home/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          yes | sdkmanager --licenses 2>/dev/null || true

      - name: Compilar APK
        env:
          ANDROID_SDK_ROOT: /github/home/.buildozer/android/platform/android-sdk
        run: |
          yes | buildozer android debug 2>&1

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoBot-APK
          path: bin/*.apk
          retention-days: 30
