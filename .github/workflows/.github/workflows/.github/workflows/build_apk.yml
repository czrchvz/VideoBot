name: Build VideoBot APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip libffi-dev libssl-dev build-essential ccache autoconf libtool pkg-config cmake libgstreamer1.0-dev lld
          pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-cache-v2
      - name: Compilar APK
        run: yes | buildozer android debug 2>&1
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoBot-APK
          path: bin/*.apk
          retention-days: 30
